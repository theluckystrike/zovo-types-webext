# name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Type check
      run: npm run typecheck || true
    
    - name: Run tests
      run: npm test

  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run quality validation
      run: |
        npm install
        node agents/agent-1-validator.js
    
    - name: Upload quality report
      uses: actions/upload-artifact@v4
      with:
        name: quality-report
        path: quality-validation-report.json
        retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build packages
      run: |
        npm run fetch || true
        npm run parse || true
        npm run generate || true
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: type-definitions
        path: |
          packages/**/*.d.ts
          packages/**/package.json
        retention-days: 7

  publish:
    needs: [test, quality, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: |
        npm run fetch || true
        npm run parse || true
        npm run generate || true
    
    - name: Update package versions
      run: |
        node -e "
        const fs = require('fs');
        const packages = ['types-chrome-extension', 'types-firefox-extension', 'types-safari-extension', 'types-edge-extension', 'types-webext-common', 'types-webext-full', 'type-helpers'];
        const version = require('./package.json').version;
        packages.forEach(pkg => {
          const pkgJson = JSON.parse(fs.readFileSync('./packages/' + pkg + '/package.json', 'utf8'));
          pkgJson.version = version;
          fs.writeFileSync('./packages/' + pkg + '/package.json', JSON.stringify(pkgJson, null, 2));
        });
        "
    
    - name: Publish @zovo/types-chrome-extension
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      working-directory: packages/types-chrome-extension
    
    - name: Publish @zovo/types-firefox-extension
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      working-directory: packages/types-firefox-extension
    
    - name: Publish @zovo/types-safari-extension
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      working-directory: packages/types-safari-extension
    
    - name: Publish @zovo/types-edge-extension
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      working-directory: packages/types-edge-extension
    
    - name: Publish @zovo/types-webext-common
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      working-directory: packages/types-webext-common
    
    - name: Publish @zovo/types-webext-full
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      working-directory: packages/types-webext-full
    
    - name: Publish @zovo/type-helpers
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      working-directory: packages/type-helpers

  release:
    needs: [publish]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Generate release notes
      run: |
        echo "# @zovo/types-webext Release v${{ github.run_number }}" > release-notes.md
        echo "" >> release-notes.md
        echo "## Changes in this release" >> release-notes.md
        echo "" >> release-notes.md
        echo "- Quality improvements" >> release-notes.md
        echo "- Enhanced type definitions" >> release-notes.md
        echo "- Updated documentation" >> release-notes.md
        echo "" >> release-notes.md
        echo "See the [changelog](./docs/CHANGELOG-API.md) for full details." >> release-notes.md
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release-notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
